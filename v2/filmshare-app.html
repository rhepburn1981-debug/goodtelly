<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.1"/>
  <title>reel. — only the good stuff</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C;
      --gold-bright: #E8C96A;
      --gold-glow: rgba(201,168,76,0.18);
      --ink: #070709;
      --surface: #0E0E14;
      --surface2: #13131C;
      --surface3: #1A1A26;
      --text: #EAE6DC;
      --text2: #9A96AA;
      --muted: #5A566A;
      --border: rgba(255,255,255,0.065);
      --border2: rgba(255,255,255,0.12);
      --green: #2ECC8A;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --ff-display: 'Cormorant Garamond', serif;
      --ff-body: 'DM Sans', system-ui, sans-serif;
      --ff-mono: 'DM Mono', monospace;
    }
    html { font-size: 112%; }
    body { background: var(--ink); min-height: 100vh; font-family: var(--ff-body); color: var(--text); }
    ::-webkit-scrollbar { display: none; }
    * { -webkit-tap-highlight-color: transparent; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes shimmer { 0%,100% { opacity:0.4; } 50% { opacity:0.85; } }
    @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes popIn { 0%{opacity:0;transform:scale(0.92)} 100%{opacity:1;transform:scale(1)} }
    @keyframes iconPop { 0%,100%{transform:scale(1)} 40%{transform:scale(1.18)} }
    button { font-family: var(--ff-body); }
    button:active { transform: scale(0.96); transition: transform 0.1s; }
    /* Frosted-glass bottom nav */
    .nav-bar {
      height: 72px;
      background: rgba(13,13,20,0.82);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; flex-shrink: 0;
      position: relative; z-index: 10;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 4px; background: none; border: none; cursor: pointer;
      padding: 10px 0; position: relative; transition: opacity 0.15s;
    }
    .nav-btn:active { opacity: 0.7; transform: scale(0.95); }
    .nav-label {
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.8px; transition: color 0.2s;
      font-family: var(--ff-body);
    }
    .nav-active-pip {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 24px; height: 2px; border-radius: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold-bright));
      animation: fadeIn 0.2s ease;
    }
    /* Active nav icon glow */
    .nav-btn-active svg path, .nav-btn-active svg circle, .nav-btn-active svg rect {
      filter: drop-shadow(0 0 4px rgba(232,201,106,0.4));
    }
    /* Genre pill active glow */
    .pill-active {
      box-shadow: 0 0 12px rgba(201,168,76,0.15);
    }
    .grain-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
    }
  </style>
</head>
<body>
  <div class="grain-overlay"></div>
  <div id="root"></div>

// ─── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("home");
  const [addedIds, setAddedIds] = useState([...INITIAL_WATCHLIST_IDS]);
  const [watchedIds, setWatchedIds] = useState([]);
  const [myList, setMyList] = useState(INITIAL_WATCHLIST);
  const [sharedCount, setSharedCount] = useState(0);
  const [toast, setToast] = useState(null);
  const [search, setSearch] = useState("");
  const [searchFocused, setSearchFocused] = useState(false);
  const [showAllPicks, setShowAllPicks] = useState(false);
  const [selectedFilm, setSelectedFilm] = useState(null);
  const [recommendFilm, setRecommendFilm] = useState(null);
  const [myListFilter, setMyListFilter] = useState("all");
  const [friendsDefaultFriend, setFriendsDefaultFriend] = useState(null);
  const [listPublic, setListPublic] = useState(true);
  const [privateIds, setPrivateIds] = useState(new Set());
  const [welcomeBanner, setWelcomeBanner] = useState(null);

  // Handle arrival from the landing page after sign-up
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    if (params.get("newUser") === "1") {
      const name     = params.get("name") || "there";
      const filmName = params.get("film");
      const fromName = params.get("from");
      setWelcomeBanner({ name, filmName, fromName });
      // Auto-add the shared film if it exists in our catalogue
      if (filmName) {
        const match = ALL_FILMS.find(f => f.title.toLowerCase() === filmName.toLowerCase());
        if (match && !addedIds.includes(match.id)) {
          setAddedIds(prev => [...prev, match.id]);
          setMyList(prev => [...prev, { id: match.id, title: match.title, year: match.year, genre: match.genre, rating: match.rating, color: match.color, poster: match.poster, streamers: match.streamers }]);
        }
      }
      // Clean the URL without reloading
      // replaceState skipped
      // Auto-dismiss banner after 5s
      setTimeout(() => setWelcomeBanner(null), 5500);
    }
  }, []);

  const togglePrivate = (id) => {
    setPrivateIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) { next.delete(id); showToastMsg("Visible to friends"); }
      else              { next.add(id);    showToastMsg("Hidden from friends"); }
      return next;
    });
  };

  const trendingFilms = [...ALL_FILMS].sort((a, b) => b.trendingViews - a.trendingViews).slice(0, 5);
  const friendPicks = ALL_FILMS.slice(0, 5);
  const visiblePicks = showAllPicks ? friendPicks : friendPicks.slice(0, 3);

  const searchResults = useMemo(() => {
    if (!search.trim()) return [];
    const q = search.toLowerCase();
    return ALL_FILMS.filter(f => f.title.toLowerCase().includes(q) || f.genre.toLowerCase().includes(q) || f.director.toLowerCase().includes(q) || f.cast.toLowerCase().includes(q));
  }, [search]);

  const addToList = (id) => {
    if (addedIds.includes(id)) return;
    const film = ALL_FILMS.find(f => f.id === id);
    if (!film) return;
    setAddedIds(prev => [...prev, id]);
    setMyList(prev => [...prev, { id, title: film.title, year: film.year, genre: film.genre, rating: film.rating, color: film.color, poster: film.poster, streamers: film.streamers }]);
    showToastMsg(`"${film.title}" added`);
  };

  const removeFromList = (id) => {
    setAddedIds(prev => prev.filter(x => x !== id));
    setWatchedIds(prev => prev.filter(x => x !== id));
    setMyList(prev => prev.filter(f => f.id !== id));
    showToastMsg("Removed from list");
  };

  const [listSort, setListSort] = useState("added");
  const [listGenreFilter, setListGenreFilter] = useState("All");
  const [watchedSort, setWatchedSort] = useState("watched");
