providers = ["python", "node"]

[phases.setup]
nixPkgs = ["python311", "nodejs"]

[phases.install]
dependsOn = ["setup"]
cmds = [
  "python -m pip install --upgrade pip",
  "pip install -r filmshare-api/requirements.txt",
  "cd v3 && npm install"
]

[phases.build]
dependsOn = ["install"]
cmds = ["cd v3 && npm run build"]

[start]
cmd = "cd filmshare-api && uvicorn main:app --host 0.0.0.0 --port $PORT"