<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>reel. — only the good stuff</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --gold: #c9a84c;
        --gold-bright: #e8c96a;
        --gold-glow: rgba(201, 168, 76, 0.18);
        --ink: #070709;
        --surface: #0e0e14;
        --surface2: #13131c;
        --surface3: #1a1a26;
        --text: #eae6dc;
        --text2: #9a96aa;
        --muted: #5a566a;
        --border: rgba(255, 255, 255, 0.065);
        --border2: rgba(255, 255, 255, 0.12);
        --green: #2ecc8a;
        --radius-sm: 10px;
        --radius-md: 14px;
        --radius-lg: 20px;
        --ff-display: "Cormorant Garamond", serif;
        --ff-body: "DM Sans", system-ui, sans-serif;
        --ff-mono: "DM Mono", monospace;
      }
      html, body {
        overflow-x: hidden;
        overscroll-behavior: none;
      }
      /* Prevent iOS auto-zoom on input focus */
      input, textarea, select {
        font-size: 16px !important;
      }
      html {
        font-size: 112%;
      }
      body {
        background: var(--ink);
        min-height: 100dvh;
        font-family: var(--ff-body);
        color: var(--text);
      }
      ::-webkit-scrollbar {
        display: none;
      }
      * {
        -webkit-tap-highlight-color: transparent;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes shimmer {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 0.85;
        }
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes popIn {
        0% {
          opacity: 0;
          transform: scale(0.92);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes iconPop {
        0%,
        100% {
          transform: scale(1);
        }
        40% {
          transform: scale(1.18);
        }
      }
      button {
        font-family: var(--ff-body);
      }
      button:active {
        transform: scale(0.96);
        transition: transform 0.1s;
      }
      /* Full-screen responsive layout */
      .app-inner {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        max-width: 680px;
        width: 100%;
        margin: 0 auto;
      }
      /* Frosted-glass bottom nav */
      .nav-bar {
        background: rgba(13, 13, 20, 0.82);
        backdrop-filter: blur(24px) saturate(1.4);
        -webkit-backdrop-filter: blur(24px) saturate(1.4);
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        flex-shrink: 0;
        position: relative;
        z-index: 10;
        padding-bottom: env(safe-area-inset-bottom, 0px);
        height: calc(72px + env(safe-area-inset-bottom, 0px));
      }
      .nav-btn {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 10px 0;
        position: relative;
        transition: opacity 0.15s;
      }
      .nav-btn:active {
        opacity: 0.7;
        transform: scale(0.95);
      }
      .nav-label {
        font-size: 9px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        transition: color 0.2s;
        font-family: var(--ff-body);
      }
      .nav-active-pip {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 24px;
        height: 2px;
        border-radius: 2px;
        background: linear-gradient(90deg, var(--gold), var(--gold-bright));
        animation: fadeIn 0.2s ease;
      }
      /* Active nav icon glow */
      .nav-btn-active svg path,
      .nav-btn-active svg circle,
      .nav-btn-active svg rect {
        filter: drop-shadow(0 0 4px rgba(232, 201, 106, 0.4));
      }
      /* Genre pill active glow */
      .pill-active {
        box-shadow: 0 0 12px rgba(201, 168, 76, 0.15);
      }
      .grain-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        opacity: 0.35;
      }
    </style>
  </head>

              const buildShareUrl = () => {
                const base = window.location.origin + "/share";
                const actualNote = note.trim() || film.note || "";
                if (film.slug) {
                  const params = [];
                  if (CURRENT_USER) params.push("from=" + encodeURIComponent(CURRENT_USER));
                  if (CURRENT_USERNAME) params.push("from_user=" + encodeURIComponent(CURRENT_USERNAME));
                  if (actualNote) params.push("note=" + encodeURIComponent(actualNote));
                  return base + "/" + film.slug + (params.length ? "?" + params.join("&") : "");

                const parts = [

                  "year=" + encodeURIComponent(film.year || ""),
                  "runtime=" + encodeURIComponent(film.runtime || ""),
                  "genre=" + encodeURIComponent(film.genre || ""),
                  "rating=" + encodeURIComponent(film.rating || ""),
                  "from=" + encodeURIComponent(CURRENT_USER),
                  "from_user=" + encodeURIComponent(CURRENT_USERNAME),

                  "trailer=" + encodeURIComponent(film.trailerUrl || ""),
                  "color=" + encodeURIComponent(film.color || ""),

            // ─── Profile Tab ─────────────────────────────────────────────────────────────
            function ProfileTab({ currentUser, authToken, myList, watchedIds, realFriends, onLogout, onFilmClick }) {
              const watched = myList.filter(f => watchedIds.includes(f.id));

            // ─── Main App ──────────────────────────────────────────────────────────────────
            function App() {
              const [tab, setTab] = useState("home");

              const [currentUser, setCurrentUser] = useState(window.__AUTH_USER || null);
              const [authToken, setAuthToken] = useState(window.__AUTH_TOKEN || null);
              const [showAuth, setShowAuth] = useState(false);
              const [realFriends, setRealFriends] = useState([]);
              const [friendsRatings, setFriendsRatings] = useState({});
              const [friendsRecommendedFilms, setFriendsRecommendedFilms] = useState([]);
              const [addedIds, setAddedIds] = useState([...INITIAL_WATCHLIST_IDS]);
              const [watchedIds, setWatchedIds] = useState(
                INITIAL_WATCHLIST.filter(f => f.isWatched).map(f => f.id)
              );
              const [myList, setMyList] = useState(INITIAL_WATCHLIST);
              const [sharedCount, setSharedCount] = useState(0);
              const [toast, setToast] = useState(null);
              const [search, setSearch] = useState("");
              const [searchFocused, setSearchFocused] = useState(false);
              const [showAllPicks, setShowAllPicks] = useState(false);
              const [selectedFilm, setSelectedFilm] = useState(null);
              const [recommendFilm, setRecommendFilm] = useState(null);
              const [myListFilter, setMyListFilter] = useState("unwatched");
              const [friendsDefaultFriend, setFriendsDefaultFriend] = useState(null);
              const [listPublic, setListPublic] = useState(true);
              const [privateIds, setPrivateIds] = useState(new Set());
              const [welcomeBanner, setWelcomeBanner] = useState(null);

              const onLogin = (user, token) => {
                setCurrentUser(user);
                setAuthToken(token);
                window.__AUTH_USER = user;
                window.__AUTH_TOKEN = token;
                fetch(API_BASE + "/api/friends", { headers: { Authorization: "Bearer " + token } })
                  .then(r => r.ok ? r.json() : []).then(fs => setRealFriends(fs)).catch(() => {});
              };
              const onLogout = () => {
                localStorage.removeItem("filmshare_token");
                window.__AUTH_TOKEN = null;
                window.__AUTH_USER = null;
                setCurrentUser(null);
                setAuthToken(null);
                setRealFriends([]);
                showToastMsg("Signed out");
              };

              React.useEffect(() => {
                const token = authToken || localStorage.getItem("filmshare_token");
                if (token && token !== authToken) {
                  setAuthToken(token);
                  fetch(API_BASE + "/api/auth/me", { headers: { Authorization: "Bearer " + token } })
                    .then(r => r.ok ? r.json() : null).then(u => { if (u) { setCurrentUser(u); window.__AUTH_USER = u; } }).catch(() => {});
                }
                if (authToken) {
                  fetch(API_BASE + "/api/friends", { headers: { Authorization: "Bearer " + authToken } })
                    .then(r => r.ok ? r.json() : []).then(fs => setRealFriends(fs)).catch(() => {});
                }
              }, []);

              React.useEffect(() => {
                if (!authToken) return;
                const headers = { Authorization: "Bearer " + authToken };
                fetch(API_BASE + "/api/me/recommendations", { headers })
                  .then(r => r.ok ? r.json() : [])
                  .then(films => setFriendsRecommendedFilms(films))
                  .catch(() => {});
                fetch(API_BASE + "/api/me/friends-ratings", { headers })
                  .then(r => r.ok ? r.json() : {})
                  .then(fr => setFriendsRatings(fr))
                  .catch(() => {});
              }, [authToken]);

              // Handle arrival from the landing page after sign-up or share link
              useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                // ?open=SLUG — open a specific film (from share link redirect)
                const openSlug = params.get("open");
                if (openSlug) {
                  const token = authToken || localStorage.getItem("filmshare_token");
                  const headers = token ? { Authorization: "Bearer " + token } : {};
                  const recFrom = params.get("rec_from") || "";
                  const recNote = params.get("rec_note") || "";
                  const recRating = params.get("rec_rating") || "";
                  fetch(API_BASE + "/api/films/slug/" + encodeURIComponent(openSlug), { headers })
                    .then(r => r.ok ? r.json() : null)
                    .then(film => {
                      if (film) {
                        if (recFrom) film._fromFriend = recFrom;
                        if (recNote) film._recNote = recNote;
                        if (recRating) film._recRating = parseFloat(recRating);
                        setSelectedFilm(film);
                      }
                    })
                    .catch(() => {});
                  window.history.replaceState({}, "", "/");
                }
                if (params.get("newUser") === "1") {
                  const name = params.get("name") || "there";
                  const filmName = params.get("film");
                  const fromName = params.get("from");
                  setWelcomeBanner({ name, filmName, fromName });
                  // Auto-add the shared film if it exists in our catalogue
                  if (filmName) {
                    const match = ALL_FILMS.find(
                      (f) => f.title.toLowerCase() === filmName.toLowerCase(),
                    );
                    if (match && !addedIds.includes(match.id)) {
                      setAddedIds((prev) => [...prev, match.id]);
                      setMyList((prev) => [
                        ...prev,
                        {
                          id: match.id,
                          title: match.title,
                          year: match.year,
                          genre: match.genre,
                          rating: match.rating,
                          color: match.color,
                          poster: match.poster,
                          streamers: match.streamers,
                        },
                      ]);
                    }
                  }
                  setTimeout(() => setWelcomeBanner(null), 5500);
                }
              }, []);

              const togglePrivate = (id) => {
                setPrivateIds((prev) => {
                  const next = new Set(prev);
                  if (next.has(id)) {
                    next.delete(id);
                    showToastMsg("Visible to friends");
                  } else {
                    next.add(id);
                    showToastMsg("Hidden from friends");
                  }
                  return next;
                });
              };

              const trendingFilms = [...ALL_FILMS]
                .sort((a, b) => b.trendingViews - a.trendingViews)
                .slice(0, 5);
              const friendPicks = ALL_FILMS.slice(0, 5);
              const visiblePicks = showAllPicks
                ? friendPicks
                : friendPicks.slice(0, 3);

              const [tmdbSearchResults, setTmdbSearchResults] = React.useState([]);
              const [tmdbSearching, setTmdbSearching] = React.useState(false);

              const localSearchResults = React.useMemo(() => {
                if (!search.trim()) return [];
                const q = search.toLowerCase();
                return ALL_FILMS.filter(
                  (f) =>
                    (f.title || '').toLowerCase().includes(q) ||
                    (f.genre || '').toLowerCase().includes(q) ||
                    (f.director || '').toLowerCase().includes(q) ||
                    (f.cast || '').toLowerCase().includes(q),
                );
              }, [search]);

              React.useEffect(() => {
                if (search.trim().length < 2) {
                  setTmdbSearchResults([]);
                  setTmdbSearching(false);
                  return;
                }
                setTmdbSearching(true);
                const timer = setTimeout(() => {
                  fetch(API_BASE + '/api/tmdb/search?q=' + encodeURIComponent(search.trim()))
                    .then(r => r.ok ? r.json() : [])
                    .then(results => {
                      const localTitles = new Set(ALL_FILMS.map(f => (f.title || '').toLowerCase()));
                      const fresh = results.filter(r => !localTitles.has((r.title || '').toLowerCase()));
                      setTmdbSearchResults(fresh.map(r => {
                        const isTvmaze = r.source === 'tvmaze';
                        return {
                          ...r,
                          id: isTvmaze ? -(10000000 + r.tvmaze_id) : -(r.tmdb_id),
                          _fromTmdb: !isTvmaze,
                          _fromTvmaze: isTvmaze,
                          genre: (r.genres || []).join(', ') || r.genre || '',
                          streamers: [],
                          stills: [],
                          color: isTvmaze ? '#1a2632' : '#1a1a2e',
                        };
                      }));
                    })
                    .catch(() => {})
                    .finally(() => setTmdbSearching(false));
                }, 500);
                return () => clearTimeout(timer);
              }, [search]);

              const searchResults = search.trim()
                ? [...localSearchResults, ...tmdbSearchResults]
                : [];

              const addToList = (id) => {
                if (addedIds.includes(id)) return;
                const tmdbFilm = id < 0 ? (tmdbFilmCacheRef.current[id] || tmdbSearchResults.find(f => f.id === id)) : null;
                if (tmdbFilm) {
                  const existingFilm = ALL_FILMS.find(f => (f.title || '').toLowerCase() === (tmdbFilm.title || '').toLowerCase());
                  if (existingFilm) {
                    setAddedIds(prev => prev.includes(existingFilm.id) ? prev : [...prev, existingFilm.id]);
                    setMyList(prev => prev.find(f => f.id === existingFilm.id) ? prev : [...prev, existingFilm]);
                    showToastMsg(`"${existingFilm.title}" is already on your watchlist`);
                    return;
                  }
                  setAddedIds(prev => [...prev, id]);
                  const body = {
                    title: tmdbFilm.title,
                    year: tmdbFilm.year ? parseInt(tmdbFilm.year) : null,
                    autoEnrich: !tmdbFilm._fromTvmaze,
                  };
                  if (tmdbFilm._fromTmdb) body.tmdbId = tmdbFilm.tmdb_id;
                  if (tmdbFilm._fromTvmaze) body.tvmazeId = tmdbFilm.tvmaze_id;
                  fetch(API_BASE + '/api/films', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                  })
                    .then(r => r.json())
                    .then(saved => {
                      ALL_FILMS.push(saved);
                      setAddedIds(prev => prev.filter(x => x !== id).concat(saved.id));
                      setMyList(prev => [...prev, saved]);
                      showToastMsg(`"${saved.title}" added to Watchlist`);
                      setSelectedFilm(f => f && f.id === id ? Object.assign({}, f, saved) : f);
                      if (authToken) {
                        fetch(API_BASE + '/api/me/watchlist/' + saved.id, {
                          method: 'POST',
                          headers: { Authorization: 'Bearer ' + authToken },
                        }).catch(() => {});
                      }
                    })
                    .catch(() => {
                      setAddedIds(prev => prev.filter(x => x !== id));
                      showToastMsg('Could not add film');
                    });
                  return;
                }
                const film = ALL_FILMS.find((f) => f.id === id);
                if (!film) return;
                setAddedIds((prev) => [...prev, id]);
                setMyList((prev) => [...prev, film]);
                showToastMsg(`"${film.title}" added`);
                if (authToken) {
                  fetch(API_BASE + '/api/me/watchlist/' + id, {
                    method: 'POST',
                    headers: { Authorization: 'Bearer ' + authToken },
                  }).catch(() => {});
                }
              };

              const removeFromList = (id) => {
                setAddedIds((prev) => prev.filter((x) => x !== id));
                setWatchedIds((prev) => prev.filter((x) => x !== id));
                setMyList((prev) => prev.filter((f) => f.id !== id));
                showToastMsg("Removed from list");
              };

              const [listSort, setListSort] = useState("added");
              const [listGenreFilter, setListGenreFilter] = useState("All");
              const [watchedSort, setWatchedSort] = useState("watched");
              const [watchedGenreFilter, setWatchedGenreFilter] = useState("All");
              const [ratingPrompt, setRatingPrompt] = useState(null);
              const [ratingPromptStars, setRatingPromptStars] = useState(0);
              const [ratingPromptForRecommend, setRatingPromptForRecommend] =
                useState(false);
              const [userRatings, setUserRatings] = useState({});
              const submitRating = (id, stars) => {
                if (stars > 0) setUserRatings((prev) => ({ ...prev, [id]: stars }));
                const forRec = ratingPromptForRecommend;
                setRatingPrompt(null);
                setRatingPromptStars(0);
                setRatingPromptForRecommend(false);
                if (forRec) {
                  const film =
                    ALL_FILMS.find((f) => f.id === id) ||
                    myList.find((f) => f.id === id) ||
                    tmdbFilmCacheRef.current[id];
                  if (film && film.id > 0) {
                    setTimeout(() => setRecommendFilm(film), 50);
                  } else {
                    showToastMsg("Add it to your watchlist first to recommend");
                  }
                } else {
                  const film =
                    ALL_FILMS.find((f) => f.id === id) ||
                    myList.find((f) => f.id === id);
                  showToastMsg(`"${film?.title}" logged as watched`);
                }
              };
              const markWatched = (id) => {
                if (watchedIds.includes(id)) return;
                setWatchedIds((prev) => [...prev, id]);
                setRatingPromptStars(0);
                setRatingPromptForRecommend(false);
                setRatingPrompt(id);
              };

              const unmarkWatched = (id) => {
                setWatchedIds((prev) => prev.filter((x) => x !== id));
                const film =
                  ALL_FILMS.find((f) => f.id === id) ||
                  myList.find((f) => f.id === id);
                showToastMsg(
                  `"${film?.title}" moved back to To Watch`,
                );
              };

              const showToastMsg = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 2500);
              };
              const tmdbFilmCacheRef = React.useRef({});
              const applyEnriched = (filmId, enriched) => {
                if (!enriched) return;
                const updates = {};
                if (enriched.trailer_url) updates.trailerUrl = enriched.trailer_url;
                if (enriched.director) updates.director = enriched.director;
                if (enriched.cast) updates.cast = enriched.cast;
                if (enriched.description) updates.description = enriched.description;
                if (enriched.runtime) updates.runtime = enriched.runtime;
                if (enriched.poster) updates.poster = enriched.poster;
                if (enriched.backdrop) updates.backdrop = enriched.backdrop;
                if (enriched.rating) updates.rating = enriched.rating;
                if (enriched.stills && enriched.stills.length) updates.stills = enriched.stills;
                if (enriched.streamers && enriched.streamers.length) updates.streamers = enriched.streamers;
                setSelectedFilm(f => f && f.id === filmId ? Object.assign({}, f, updates) : f);
                if (filmId < 0) tmdbFilmCacheRef.current[filmId] = Object.assign({}, tmdbFilmCacheRef.current[filmId] || {}, updates);
              };
              const openFilm = (film) => {

                  const [meRes, wlRes] = await Promise.all([
                    fetch(API_BASE + '/api/auth/me', { headers: authHeaders }).then(r => r.ok ? r.json() : null).catch(() => null),
                    fetch(API_BASE + '/api/me/watchlist', { headers: authHeaders }).then(r => r.json()).catch(() => []),
                  ]);
                  if (meRes) {
                    window.__AUTH_USER = meRes;
                    window.__AUTH_TOKEN = token;
                    const wl = Array.isArray(wlRes) ? wlRes : [];
                    INITIAL_WATCHLIST = wl;
                    INITIAL_WATCHLIST_IDS = wl.map(f => f.id);
                  }
                }
              } catch (e) {
                console.warn('API bootstrap failed, running with empty data:', e);
              }

              const root = ReactDOM.createRoot(document.getElementById('root'));
              root.render(React.createElement(App, null));
            }

            bootstrap();
    </script>
  </body>
</html>
