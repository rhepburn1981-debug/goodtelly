<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>reel. — only the good stuff</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --gold: #c9a84c;
        --gold-bright: #e8c96a;
        --gold-glow: rgba(201, 168, 76, 0.18);
        --ink: #070709;
        --surface: #0e0e14;
        --surface2: #13131c;
        --surface3: #1a1a26;
        --text: #eae6dc;
        --text2: #9a96aa;
        --muted: #5a566a;
        --border: rgba(255, 255, 255, 0.065);
        --border2: rgba(255, 255, 255, 0.12);
        --green: #2ecc8a;
        --radius-sm: 10px;
        --radius-md: 14px;
        --radius-lg: 20px;
        --ff-display: "Cormorant Garamond", serif;
        --ff-body: "DM Sans", system-ui, sans-serif;
        --ff-mono: "DM Mono", monospace;
      }
      html, body {
        overflow-x: hidden;
        overscroll-behavior: none;
      }
      /* Prevent iOS auto-zoom on input focus */
      input, textarea, select {
        font-size: 16px !important;
      }
      html {
        font-size: 112%;
      }
      body {
        background: var(--ink);
        min-height: 100dvh;
        font-family: var(--ff-body);
        color: var(--text);
      }
      ::-webkit-scrollbar {
        display: none;
      }
      * {
        -webkit-tap-highlight-color: transparent;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes shimmer {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 0.85;
        }
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes popIn {
        0% {
          opacity: 0;
          transform: scale(0.92);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes iconPop {
        0%,
        100% {
          transform: scale(1);
        }
        40% {
          transform: scale(1.18);
        }
      }
      button {
        font-family: var(--ff-body);
      }
      button:active {
        transform: scale(0.96);
        transition: transform 0.1s;
      }
      /* Full-screen responsive layout */
      .app-inner {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        max-width: 480px;
        width: 100%;
        margin: 0 auto;
        position: relative;
        background:
          radial-gradient(circle at 70% 10%, rgba(152, 112, 46, 0.08), transparent 22%),
          radial-gradient(circle at 14% 10%, rgba(35, 84, 169, 0.08), transparent 17%),
          linear-gradient(180deg, #0a0b10 0%, #04050a 100%);
        box-shadow: 0 0 0 1px rgba(255,255,255,0.045), 0 24px 64px rgba(0,0,0,0.34);
      }
      /* Frosted-glass bottom nav */
      .nav-bar {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: min(100%, 364px);
        z-index: 100;
        background: rgba(9, 10, 15, 0.94);
        backdrop-filter: blur(24px) saturate(1.4);
        -webkit-backdrop-filter: blur(24px) saturate(1.4);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        padding-bottom: env(safe-area-inset-bottom, 0px);
        height: calc(72px + env(safe-area-inset-bottom, 0px));
      }
      .nav-btn {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 10px 0;
        position: relative;
        transition: opacity 0.15s;
      }
      .nav-btn:active {
        opacity: 0.7;
        transform: scale(0.95);
      }
      .nav-label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.1px;
        transition: color 0.2s;
        font-family: var(--ff-body);
      }
      @media (min-width: 480px) {
        body {
          background: linear-gradient(180deg, #d8d7dc 0%, #cac8d0 100%);
        }
        .app-inner {
          margin-top: 12px;
          border-radius: 34px 34px 0 0;
          min-height: calc(100dvh - 12px);
          overflow: hidden;
        }
        .nav-bar {
          border-radius: 0 0 30px 30px;
          overflow: hidden;
        }
      }
      .nav-active-pip {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 24px;
        height: 2px;
        border-radius: 2px;
        background: linear-gradient(90deg, var(--gold), var(--gold-bright));
        animation: fadeIn 0.2s ease;
      }
      /* Active nav icon glow */
      .nav-btn-active svg path,
      .nav-btn-active svg circle,
      .nav-btn-active svg rect {
        filter: drop-shadow(0 0 4px rgba(232, 201, 106, 0.4));
      }
      /* Genre pill active glow */
      .pill-active {
        box-shadow: 0 0 12px rgba(201, 168, 76, 0.15);
      }
      .grain-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        opacity: 0.22;
      }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
